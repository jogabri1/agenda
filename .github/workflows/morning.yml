name: Resumen de la manana

on:
  schedule:
    # 07:05 Perú (UTC-5) = 12:05 UTC. Usamos el minuto :05 (no :00) porque GitHub
    # retrasa mucho más los crons en el minuto en punto. Perú no usa horario de verano.
    - cron: "5 12 * * *"
  workflow_dispatch: {} # permite ejecutarlo a mano desde la pestaña Actions

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: node scripts/send-morning.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TIMEZONE: ${{ vars.TIMEZONE }}
          NEXT_DAYS: ${{ vars.NEXT_DAYS }}
