name: Resumen de la manana

on:
  # Lo dispara cron-job.org (reloj fiable) cada día a las 07:05 (hora Perú) vía API,
  # y también se puede lanzar a mano. Ya NO usamos el cron de GitHub (no es puntual).
  workflow_dispatch: {}

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: node scripts/send-morning.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TIMEZONE: ${{ vars.TIMEZONE }}
          NEXT_DAYS: ${{ vars.NEXT_DAYS }}
