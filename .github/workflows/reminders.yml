name: Recordatorios (5h / 3h / 1h)

on:
  schedule:
    # Cada ~15 minutos, pero en minutos IMPARES (no :00/:15/:30/:45) porque GitHub
    # retrasa/salta más los crons en horas "redondas" por la mucha carga.
    # La hora la calcula el script según TIMEZONE; aquí el cron es en UTC.
    - cron: "8,23,38,53 * * * *"
  workflow_dispatch: {} # permite ejecutarlo a mano desde la pestaña Actions

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: node scripts/send-reminders.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TIMEZONE: ${{ vars.TIMEZONE }}
