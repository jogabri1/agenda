name: Recordatorios (3h / 1h / a la hora)

on:
  # Lo dispara cron-job.org (reloj fiable) cada 15 min vía API, y también se puede
  # lanzar a mano desde la pestaña Actions. Ya NO usamos el cron de GitHub porque
  # en el plan gratis no es puntual (se retrasa y se salta ejecuciones).
  workflow_dispatch: {}

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: node scripts/send-reminders.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TIMEZONE: ${{ vars.TIMEZONE }}
